<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" fill="none" role="img" aria-label="Financial analytics illustration">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="24" y="48" width="512" height="324" rx="24" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <rect x="48" y="72" width="140" height="88" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
  <text x="68" y="100" fill="rgba(255,255,255,0.55)" font-family="system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="0.08em">TOTAL BALANCE</text>
  <text x="68" y="138" fill="#ffffff" font-family="system-ui,sans-serif" font-size="28" font-weight="700">$24,580</text>
  <path d="M68 148h100" stroke="rgba(255,255,255,0.2)"/>
  <text x="68" y="168" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="12" font-weight="600">+12.4% this month</text>
  <rect x="208" y="72" width="304" height="88" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
  <rect x="232" y="118" width="36" height="28" rx="6" fill="url(#bar1)"/>
  <rect x="280" y="102" width="36" height="44" rx="6" fill="url(#bar2)"/>
  <rect x="328" y="110" width="36" height="36" rx="6" fill="url(#bar1)" opacity="0.85"/>
  <rect x="376" y="96" width="36" height="50" rx="6" fill="url(#bar2)" opacity="0.9"/>
  <rect x="424" y="108" width="36" height="38" rx="6" fill="url(#bar1)" opacity="0.7"/>
  <path d="M48 200h464" stroke="rgba(255,255,255,0.12)"/>
  <text x="48" y="228" fill="rgba(255,255,255,0.55)" font-family="system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="0.08em">CASH FLOW</text>
  <path d="M72 320 C120 280 160 340 220 300 S340 260 400 290 S480 250 488 270" stroke="url(#line)" stroke-width="3" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <circle cx="72" cy="320" r="5" fill="#c7d2fe"/>
  <circle cx="220" cy="300" r="5" fill="#a7f3d0"/>
  <circle cx="400" cy="290" r="5" fill="#c7d2fe"/>
  <g transform="translate(380 300)">
    <rect width="128" height="56" rx="12" fill="rgba(15,23,42,0.55)" stroke="rgba(255,255,255,0.2)"/>
    <circle cx="28" cy="28" r="16" fill="rgba(129,140,248,0.35)" stroke="#a5b4fc" stroke-width="1.5"/>
    <path d="M22 28h12M28 22v12" stroke="#e0e7ff" stroke-width="2" stroke-linecap="round"/>
    <text x="52" y="26" fill="#ffffff" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Budget</text>
    <text x="52" y="44" fill="rgba(255,255,255,0.65)" font-family="system-ui,sans-serif" font-size="10">On track</text>
  </g>
  <g transform="translate(48 300)">
    <circle cx="32" cy="32" r="32" fill="rgba(52,211,153,0.2)" stroke="rgba(110,231,183,0.5)" stroke-width="1.5"/>
    <text x="32" y="28" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="18" font-weight="700">$</text>
    <text x="32" y="44" text-anchor="middle" fill="#a7f3d0" font-family="system-ui,sans-serif" font-size="9" font-weight="600">SAVED</text>
  </g>
</svg>
